version: '3.8'

services:
  frontend:
    image: gtombrink/trajectopy-web:latest
    depends_on:
      - reverse-proxy

  backend:
    image: gtombrink/trajectopy-api:latest
    depends_on:
      - reverse-proxy

  reverse-proxy:
    image: nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
